# ============================================================
# CI —— A股量化交易系统
# ============================================================
# 触发：push 到主分支 / 针对主分支的 PR / 手动
# 门禁：pytest 必须通过（阻断合并）
# 信息：ruff lint 当前为非阻断（codebase 尚在收敛中），
#       待存量 lint 清理完成后，移除 continue-on-error 即转为强门禁。
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同一分支的旧运行在新提交到来时自动取消，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff) — 非阻断
        continue-on-error: true
        run: ruff check src tests --output-format=github

      - name: Run tests (pytest)
        # 不跑需要外网的数据源测试，保证 CI 离线可复现
        run: pytest -m "not network" --cov --cov-report=term-missing
